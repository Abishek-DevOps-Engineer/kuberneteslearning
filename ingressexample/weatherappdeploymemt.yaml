apiVersion: apps/v1
kind: Deployment
metadata:
  name: weatherappdeployment
  labels:
    app: weatherapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weatherapp
  template:
    metadata:
      labels:
        app: weatherapp
    spec:
      containers:
      - name: flaskweatherapp
        image: abishek1710/flaskweatherapp:latest 
        ports:
        - containerPort: 5000

---

apiVersion: v1
kind: Service
metadata:
  name: weatherappservice
spec:
  selector:
    app: weatherapp
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30001


